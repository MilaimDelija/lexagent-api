services:
  - type: web
    name: lexagent-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: LEXAGENT_MASTER_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
